services:
  app:
    image: ${CHIHIRO_IMAGE:-ghcr.io/your-github-user-or-org/chihiro:latest}
    container_name: chihiro-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://chihiro:chihiro@postgres:5432/chihiro?schema=public}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: chihiro-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chihiro}
      POSTGRES_USER: ${POSTGRES_USER:-chihiro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chihiro}
    ports:
      - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - chihiro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-chihiro} -d $${POSTGRES_DB:-chihiro}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chihiro-postgres-data:
