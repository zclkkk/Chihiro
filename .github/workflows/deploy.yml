name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ vars.DEPLOY_PATH || '/srv/chihiro/current' }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          CHIHIRO_IMAGE: ${{ steps.image.outputs.name }}:${{ github.sha }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || 'chihiro' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,DEPLOY_BRANCH,CHIHIRO_IMAGE,COMPOSE_PROJECT_NAME,GHCR_USERNAME,GHCR_TOKEN
          script: |
            git config --global --add safe.directory "$APP_DIR"
            cd "$APP_DIR"
            bash scripts/deploy/docker-deploy.sh
