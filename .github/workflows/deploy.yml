name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: chihiro:${{ github.sha }}
          outputs: type=docker,dest=chihiro-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image archive
        uses: actions/upload-artifact@v4
        with:
          name: chihiro-image
          path: chihiro-image.tar
          retention-days: 1

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image archive
        uses: actions/download-artifact@v4
        with:
          name: chihiro-image

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ vars.DEPLOY_PATH || '/www/wwwroot/www.xiami.dev' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: APP_DIR
          script: |
            mkdir -p "$APP_DIR/scripts/deploy"

      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          source: "chihiro-image.tar,docker-compose.yml,scripts/deploy/docker-load-deploy.sh"
          target: ${{ vars.DEPLOY_PATH || '/www/wwwroot/www.xiami.dev' }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ vars.DEPLOY_PATH || '/www/wwwroot/www.xiami.dev' }}
          CHIHIRO_IMAGE: chihiro:${{ github.sha }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || 'chihiro' }}
          IMAGE_TAR: chihiro-image.tar
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: APP_DIR,CHIHIRO_IMAGE,COMPOSE_PROJECT_NAME,IMAGE_TAR
          script: |
            cd "$APP_DIR"
            bash scripts/deploy/docker-load-deploy.sh
